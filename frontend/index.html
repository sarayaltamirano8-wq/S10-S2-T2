<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inventario</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header-main">
            <i class="fas fa-box box-icon"></i>
            <div>
                <h1>Sistema de Inventario</h1>
                <p class="subtitle">Gestiona tus productos de manera fácil y rápida</p>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header success-text">
                <i class="fas fa-plus-circle"></i> Nuevo Producto
            </div>
            <div class="form-row">
                <div class="input-group">
                    <label>Nombre del producto</label>
                    <input type="text" id="nombre" placeholder="Ej: Laptop Lenovo">
                </div>
                <div class="input-group">
                    <label>Precio (S/.)</label>
                    <input type="number" id="precio" placeholder="Ej: 2500">
                </div>
                <div class="input-group">
                    <label>Stock</label>
                    <input type="number" id="stock" placeholder="Ej: 10">
                </div>
                <button id="btnGuardar" class="btn-success">
                    <i class="fas fa-save"></i> Guardar Producto
                </button>
            </div>
        </div>

        <div class="card">
            <div class="card-header primary-text">
                <i class="fas fa-list"></i> Lista de Productos
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Precio (S/.)</th>
                        <th>Stock</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaProductos">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="modalEditar" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <i class="fas fa-edit"></i>
                <h3>Editar Producto</h3>
            </div>
            <div class="modal-body">
                <div class="input-group-modal">
                    <label>Nombre del producto:</label>
                    <input type="text" id="editNombre">
                </div>
                <div class="input-group-modal">
                    <label>Precio (S/.):</label>
                    <input type="number" id="editPrecio">
                </div>
                <div class="input-group-modal">
                    <label>Stock:</label>
                    <input type="number" id="editStock">
                </div>
            </div>
            <div class="modal-footer">
                <button id="btnCancelar" class="btn-secondary">Cancelar</button>
                <button id="btnGuardarCambios" class="btn-success">Actualizar Producto</button>
            </div>
        </div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
